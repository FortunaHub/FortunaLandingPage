# Deploy React Landing Page to GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/' }}
          VITE_REPOSITORY_NAME: ${{ github.event.repository.name }}
          VITE_ROUTER_BASENAME: ${{ vars.VITE_ROUTER_BASENAME || '' }}
          VITE_FORMSPREE_ENDPOINT: ${{ secrets.VITE_FORMSPREE_ENDPOINT }}
        run: npm run build

      - name: Verify built asset paths
        run: |
          echo "VITE_BASE_PATH=${VITE_BASE_PATH}"
          echo "VITE_ROUTER_BASENAME=${VITE_ROUTER_BASENAME}"
          grep -Eo 'src="[^"]+|href="[^"]+' dist/index.html | grep -E 'assets|favicon|logo' || true

      - name: Prepare deployment
        run: |
          cp CNAME dist/ 2>/dev/null || true
          touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
